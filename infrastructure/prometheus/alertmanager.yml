# =============================================================================
# Stratum AI - Alertmanager Configuration
# =============================================================================
# Routes alerts from Prometheus to notification channels.
# Configure receivers below with your Slack webhook or email SMTP.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Configure Slack or email here:
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#stratum-alerts'
    #     send_resolved: true
    #     title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.summary }}'

  - name: 'critical'
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#stratum-critical'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
