<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Stratum AI — Your AI Partner for Unstoppable Ad Growth. Enterprise-grade intelligence, automation, and optimization across every ad platform." />
    <meta name="theme-color" content="#0B0B0B" />
    <style>html, body { background-color: #0B0B0B; margin: 0; }</style>
    <title>Stratum AI — Your AI Partner for Ad Growth</title>
    <!-- Pre-paint theme bootstrap.
         Runs before React mounts so the correct .dark / .light class is on
         <html> on the first paint — avoids the dreaded theme flash.
         Reads localStorage('stratum-theme') ∈ {dark, light, system}; falls
         back to system preference; defaults to dark.
         The theme-no-transition class disables CSS transitions during
         this initial swap, then is removed on next animation frame so
         subsequent toggles cross-fade smoothly. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('stratum-theme');
          var resolved;
          if (stored === 'light' || stored === 'dark') {
            resolved = stored;
          } else {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          var html = document.documentElement;
          html.classList.add('theme-no-transition');
          html.classList.remove('light', 'dark');
          html.classList.add(resolved);
          // Drop the transition-suppressor on the next paint so user toggles
          // animate, but the initial paint doesn't.
          window.requestAnimationFrame(function () {
            window.requestAnimationFrame(function () {
              html.classList.remove('theme-no-transition');
            });
          });
        } catch (_) {
          // localStorage / matchMedia unavailable (SSR, sandboxed iframe) —
          // leave default class state alone.
        }
      })();
    </script>
    <!-- Fonts: Geist + Geist Mono (whole product), Cairo (Arabic locale) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      // Runtime config — set by deployment pipeline via envsubst.
      // When VITE_API_URL is baked in at build time, this is not needed.
      // Only override if explicitly injected by the server.
      window.__RUNTIME_CONFIG__ = {};
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
