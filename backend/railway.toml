[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
noCache = true

[deploy]
startCommand = "echo PORT=$PORT && echo PWD=$(pwd) && ls -la app/main.py && python -c 'print(\"Python OK\")' && python -c 'from app.main import app; print(\"Import OK\")' && exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
