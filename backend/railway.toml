[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
noCache = true

[deploy]
startCommand = "echo 'Starting uvicorn on port ${PORT}...' && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
healthcheckPath = "/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
